<!DOCTYPE html>
<html>
    <title>   Images   </title>

    <body>
        <!-- If height || width is changed, one of them adjusts with the other one automatically
             alt = attribute to provide an alternative description for an image
             if Image is in a folder then the images source should be writen in this way
             foldername/image name with extension -->
        
        <a href = "https://www.apple.com"
        target = "_blank" >

            <img src = "images/apple.png"
            alt = "This is a picture of an Apple"
            height = "250">
            <h3> Nice... </h3>
        </a>
    </body>
</html>
