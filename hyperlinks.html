<!DOCTYPE html>
<html>
    <head>
        <title>    Hypertext   </title>
    </head>

    <body>
        <!-- Anchor = <a> -->
        <!-- target = attribute linked with anchor, by default browser changes this current link with the link 
             but if target used then it will open in a new browser or tab (commonly opens in new tab)-->
        <!-- title = Tooltip (show's this text when you hover over that text )-->

        <a href = "https://www.google.com/"
        target="_blank"
        title = "Goes to Google">
            Click Me
        </a>
        <br>
        <a href = "lyrics.html">
            Nasheed Lyrics
        </a>
        <br>
        <a href = "mailto:test@fake.com">
            Email Me
        </a>
    </body>
</html>
